name: Update Hamada offshore current data

on:
  schedule:
    # 21:30 UTC = 06:30 JST. Fetch yesterday's data once per day.
    - cron: "30 21 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "Fetch one date, e.g. 2026-05-07. Empty means yesterday JST."
        required: false
        default: ""
      collect_all:
        description: "Set true only when rebuilding all data from 2022-01-01."
        required: false
        default: ""

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Hamada current data
        env:
          COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.CMEMS_USERNAME }}
          COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.CMEMS_PASSWORD }}
        run: |
          set -o pipefail
          if [ "${{ github.event.inputs.collect_all }}" = "true" ]; then
            python scripts/update_hamada_current.py --all 2>&1 | tee /tmp/hamada-current.log
          elif [ -n "${{ github.event.inputs.target_date }}" ]; then
            python scripts/update_hamada_current.py --date "${{ github.event.inputs.target_date }}" 2>&1 | tee /tmp/hamada-current.log
          else
            python scripts/update_hamada_current.py 2>&1 | tee /tmp/hamada-current.log
          fi

          if grep -qiE "forgot my username|password|unauthorized|invalid credentials" /tmp/hamada-current.log; then
            echo "::error title=CMEMS authentication failed::Check repository secrets CMEMS_USERNAME and CMEMS_PASSWORD."
            exit 1
          fi

      - name: Commit and push CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/hamada_offshore_current_all.csv || true

          if git diff --staged --quiet; then
            echo "No CSV changes."
          else
            git commit -m "Update Hamada offshore current data: $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
            git push
          fi
